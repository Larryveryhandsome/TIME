<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>時刻 Moment - 把時間當作朋友</title>
    <meta name="description" content="專注於當下的三個重要任務。">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #000;
            color: #e4e4e7; /* zinc-200 */
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden; /* Prevent body scroll, handle in app */
        }
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Icons (Replaced Lucide imports with SVG components for single-file portability) ---
        const IconBase = ({ children, size = 24, className = "", ...props }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className} 
                {...props}
            >
                {children}
            </svg>
        );

        const Play = (props) => <IconBase {...props}><polygon points="5 3 19 12 5 21 5 3"></polygon></IconBase>;
        const Square = (props) => <IconBase {...props}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></IconBase>;
        const Check = (props) => <IconBase {...props}><polyline points="20 6 9 17 4 12"></polyline></IconBase>;
        const Plus = (props) => <IconBase {...props}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></IconBase>;
        const Calendar = (props) => <IconBase {...props}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></IconBase>;
        const BarChart2 = (props) => <IconBase {...props}><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></IconBase>;
        const Clock = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></IconBase>;
        const ChevronLeft = (props) => <IconBase {...props}><polyline points="15 18 9 12 15 6"></polyline></IconBase>;
        const ChevronRight = (props) => <IconBase {...props}><polyline points="9 18 15 12 9 6"></polyline></IconBase>;
        const X = (props) => <IconBase {...props}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></IconBase>;

        // --- Global Styles for Animations ---
        const GlobalStyles = () => (
            <style>{`
                @keyframes drawLine {
                    0% { height: 0; opacity: 0; }
                    40% { height: 80px; opacity: 1; }
                    100% { height: 80px; opacity: 1; }
                }
                @keyframes splitDots {
                    0% { transform: scaleY(1); opacity: 1; height: 80px; }
                    50% { transform: scaleY(0.1); opacity: 0.5; height: 80px; }
                    100% { transform: scaleY(0); opacity: 0; height: 0; }
                }
                @keyframes textRevealLeft {
                    0% { opacity: 0; transform: translateX(20px); }
                    100% { opacity: 1; transform: translateX(0); }
                }
                @keyframes textRevealRight {
                    0% { opacity: 0; transform: translateX(-20px); }
                    100% { opacity: 1; transform: translateX(0); }
                }
                @keyframes fadeUpSub {
                    0% { opacity: 0; transform: translateY(10px); }
                    100% { opacity: 0.6; transform: translateY(0); }
                }
                @keyframes dotAppear {
                    0% { transform: scale(0); opacity: 0; }
                    60% { transform: scale(1.2); opacity: 0.8; }
                    100% { transform: scale(1); opacity: 1; }
                }
                @keyframes shimmer {
                    0% { transform: translateX(-100%); }
                    100% { transform: translateX(100%); }
                }
                
                .anim-line { animation: drawLine 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
                .anim-text-l { animation: textRevealLeft 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards; opacity: 0; }
                .anim-text-r { animation: textRevealRight 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards; opacity: 0; }
                .anim-sub { animation: fadeUpSub 1s ease-out 2s forwards; opacity: 0; }
                
                .anim-dot-1 { animation: dotAppear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 1.5s forwards; opacity: 0; }
                .anim-dot-2 { animation: dotAppear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 1.7s forwards; opacity: 0; }
                .anim-dot-3 { animation: dotAppear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 1.9s forwards; opacity: 0; }

                .animate-shimmer { animation: shimmer 2s infinite linear; }

                .custom-scrollbar::-webkit-scrollbar {
                    width: 4px;
                }
                .custom-scrollbar::-webkit-scrollbar-track {
                    background: transparent;
                }
                .custom-scrollbar::-webkit-scrollbar-thumb {
                    background: #333;
                    border-radius: 4px;
                }
            `}</style>
        );

        // --- Components ---

        // Button Component
        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false }) => {
            const baseStyle = "px-6 py-3 rounded-2xl font-medium transition-all duration-300 active:scale-95 flex items-center justify-center gap-2";
            const variants = {
                primary: "bg-white text-black hover:bg-gray-200 disabled:bg-gray-800 disabled:text-gray-500",
                secondary: "bg-zinc-800 text-white hover:bg-zinc-700 disabled:opacity-50",
                outline: "border border-zinc-700 text-zinc-300 hover:bg-zinc-900",
                ghost: "text-zinc-400 hover:text-white"
            };

            return (
                <button 
                    onClick={onClick} 
                    disabled={disabled}
                    className={`${baseStyle} ${variants[variant]} ${className}`}
                >
                    {children}
                </button>
            );
        };

        // Card Component
        const Card = ({ children, className = '', onClick }) => (
            <div onClick={onClick} className={`bg-zinc-900/50 backdrop-blur-sm border border-zinc-800/50 p-5 rounded-3xl ${className}`}>
                {children}
            </div>
        );

        // --- Splash Screen Component ---
        const SplashScreen = ({ onFinish }) => {
            const [fading, setFading] = useState(false);

            useEffect(() => {
                const timer = setTimeout(() => {
                    setFading(true);
                    setTimeout(onFinish, 800); 
                }, 3800);
                return () => clearTimeout(timer);
            }, [onFinish]);

            return (
                <div className={`fixed inset-0 z-50 bg-black flex flex-col items-center justify-center transition-opacity duration-1000 ${fading ? 'opacity-0 pointer-events-none' : 'opacity-100'}`}>
                    
                    {/* Central Visual Composition */}
                    <div className="relative flex flex-col items-center justify-center h-40 w-full mb-8">
                        
                        {/* The Vertical Time Line */}
                        <div className="absolute w-[1px] bg-zinc-700 anim-line" />

                        {/* The Logo Text */}
                        <div className="flex items-center gap-12 z-10">
                            <h1 className="text-7xl font-serif text-white tracking-widest anim-text-l">時</h1>
                            <h1 className="text-7xl font-serif text-white tracking-widest anim-text-r">刻</h1>
                        </div>
                    </div>

                    {/* The Dots Animation Container */}
                    <div className="flex gap-4 mb-8 h-4">
                        <div className="w-2 h-2 bg-white rounded-full anim-dot-1 shadow-[0_0_10px_rgba(255,255,255,0.8)]" />
                        <div className="w-2 h-2 bg-white rounded-full anim-dot-2 shadow-[0_0_10px_rgba(255,255,255,0.8)]" />
                        <div className="w-2 h-2 bg-white rounded-full anim-dot-3 shadow-[0_0_10px_rgba(255,255,255,0.8)]" />
                    </div>

                    {/* Subtitle */}
                    <p className="font-serif text-sm tracking-[0.5em] text-white uppercase anim-sub">
                        把時間當作朋友
                    </p>

                    {/* Subtle Background Glow */}
                    <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-zinc-900/40 via-black to-black pointer-events-none z-[-1]"></div>
                </div>
            );
        };

        // --- Sub Views ---

        const TaskItem = ({ task, onAction, onDelete }) => {
            const isCompleted = task.status === 'completed';
            const isRunning = task.status === 'running';

            // Long press handler for mobile deletion simulation could be added here, 
            // but for simplicity we keep the hover/X button.
            
            return (
                <div className="relative group">
                    {/* Delete button */}
                    {task.status !== 'completed' && (
                        <button 
                            onClick={(e) => { e.stopPropagation(); onDelete(); }}
                            className="absolute -right-2 -top-2 bg-zinc-800 rounded-full p-2 text-zinc-400 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity z-20 shadow-md"
                        >
                            <X size={12} />
                        </button>
                    )}
                
                    <div 
                        onClick={!isCompleted ? onAction : undefined}
                        className={`
                            relative overflow-hidden h-32 p-6 rounded-3xl flex flex-col justify-between transition-all duration-500
                            ${isCompleted ? 'bg-white text-black' : 'bg-zinc-900 border border-zinc-800 active:scale-[0.98] cursor-pointer'}
                            ${isRunning ? 'border-zinc-500 shadow-[0_0_30px_-5px_rgba(255,255,255,0.1)]' : ''}
                        `}
                    >
                        {/* Background Pulse for Running Task */}
                        {isRunning && (
                            <div className="absolute inset-0 bg-gradient-to-r from-transparent via-zinc-800/30 to-transparent w-[200%] animate-shimmer pointer-events-none" />
                        )}

                        <div className="flex justify-between items-start z-10">
                            <h3 className={`text-xl font-medium line-clamp-2 ${isCompleted ? 'line-through decoration-gray-400 text-gray-600' : 'text-white'}`}>
                                {task.title}
                            </h3>
                            <div className={`
                                h-8 w-8 rounded-full flex items-center justify-center transition-all duration-500
                                ${isCompleted ? 'bg-black text-white' : isRunning ? 'bg-white text-black animate-pulse' : 'bg-zinc-800 text-zinc-500'}
                            `}>
                                {isCompleted ? <Check size={16} /> : isRunning ? <Square size={14} fill="currentColor" /> : <Play size={14} fill="currentColor" className="ml-0.5" />}
                            </div>
                        </div>

                        <div className="flex justify-between items-end z-10">
                            <span className={`text-xs font-medium tracking-wider uppercase ${isCompleted ? 'text-gray-500' : 'text-zinc-500'}`}>
                                {isCompleted ? '已完成' : isRunning ? '進行中...' : '等待開始'}
                            </span>
                            
                            {isRunning && (
                                <span className="text-xs font-mono text-zinc-400">
                                    專注模式
                                </span>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const HomeView = ({ tasks, remainingSlots, onAddTask, onAction, onDelete }) => {
            return (
                <div className="flex flex-col gap-4 pb-24 animate-in fade-in slide-in-from-bottom-4 duration-700 delay-300">
                    {/* Quote / Status */}
                    <div className="mb-4">
                        {tasks.length === 0 ? (
                            <p className="text-zinc-400 text-sm leading-relaxed">
                                「時間不是流逝的，流逝的是我們。」<br/>
                                今天，哪三件事對你最重要？
                            </p>
                        ) : (
                            <p className="text-zinc-500 text-sm">
                                專注於當下，一件一件來。
                            </p>
                        )}
                    </div>

                    {/* Task List */}
                    <div className="flex flex-col gap-4">
                        {tasks.map((task) => (
                            <TaskItem key={task.id} task={task} onAction={() => onAction(task.id)} onDelete={() => onDelete(task.id)} />
                        ))}

                        {/* Empty Slots */}
                        {Array.from({ length: remainingSlots }).map((_, i) => (
                            <button 
                                key={`empty-${i}`}
                                onClick={onAddTask}
                                className="group h-24 rounded-3xl border border-dashed border-zinc-800 flex items-center justify-center text-zinc-600 hover:border-zinc-600 hover:text-zinc-400 transition-all active:scale-95"
                            >
                                <span className="text-sm font-medium tracking-wide group-hover:scale-110 transition-transform flex items-center gap-2">
                                    <Plus size={16} /> 添加今日任務
                                </span>
                            </button>
                        ))}
                    </div>
                </div>
            );
        };

        const AddTaskView = ({ onCancel, onConfirm }) => {
            const [text, setText] = useState('');

            return (
                <div className="flex flex-col h-full animate-in fade-in slide-in-from-bottom-8 duration-300 pt-10">
                    <div className="flex-1 flex flex-col justify-center gap-8">
                        <div className="space-y-2">
                            <h2 className="text-2xl font-serif text-white">這件事有多重要？</h2>
                            <p className="text-zinc-500">這將是你今天僅有的三個扣打之一。</p>
                        </div>
                        
                        <input 
                            autoFocus
                            type="text" 
                            value={text}
                            onChange={(e) => setText(e.target.value)}
                            placeholder="例如：完成專案報告..."
                            className="bg-transparent text-3xl md:text-4xl text-white placeholder:text-zinc-800 outline-none border-b border-zinc-800 py-4 font-medium w-full"
                        />
                    </div>

                    <div className="flex gap-4 pb-8">
                        <Button variant="ghost" onClick={onCancel} className="flex-1">取消</Button>
                        <Button 
                            variant="primary" 
                            disabled={!text.trim()}
                            onClick={() => onConfirm(text)} 
                            className="flex-[2]"
                        >
                            確認添加
                        </Button>
                    </div>
                </div>
            );
        };

        const StatsView = ({ tasks }) => {
            const [currentMonth, setCurrentMonth] = useState(new Date());

            const getMonthData = () => {
                const year = currentMonth.getFullYear();
                const month = currentMonth.getMonth();
                
                // Filter tasks for this month
                const monthlyTasks = tasks.filter(t => {
                    const d = new Date(t.date);
                    return d.getFullYear() === year && d.getMonth() === month;
                });

                const completed = monthlyTasks.filter(t => t.status === 'completed');
                const rate = monthlyTasks.length > 0 ? Math.round((completed.length / monthlyTasks.length) * 100) : 0;

                return { monthlyTasks, completed, rate };
            };

            const { monthlyTasks, completed, rate } = getMonthData();

            const changeMonth = (delta) => {
                const newDate = new Date(currentMonth);
                newDate.setMonth(newDate.getMonth() + delta);
                setCurrentMonth(newDate);
            };

            return (
                <div className="space-y-8 pb-24 animate-in fade-in duration-500">
                    
                    {/* Month Navigator */}
                    <div className="flex items-center justify-between py-4">
                        <button onClick={() => changeMonth(-1)} className="p-2 text-zinc-500 hover:text-white transition-colors"><ChevronLeft /></button>
                        <h2 className="text-xl font-medium">
                            {currentMonth.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long' })}
                        </h2>
                        <button onClick={() => changeMonth(1)} className="p-2 text-zinc-500 hover:text-white transition-colors"><ChevronRight /></button>
                    </div>

                    {/* Summary Card */}
                    <div className="grid grid-cols-2 gap-4">
                        <Card className="flex flex-col items-center justify-center gap-2 aspect-square">
                            <span className="text-5xl font-serif text-white">{rate}%</span>
                            <span className="text-xs text-zinc-500 uppercase tracking-widest">完成率</span>
                        </Card>
                        <Card className="flex flex-col items-center justify-center gap-2 aspect-square">
                            <span className="text-5xl font-serif text-white">{completed.length}</span>
                            <span className="text-xs text-zinc-500 uppercase tracking-widest">完成事項</span>
                        </Card>
                    </div>

                    {/* Completed List */}
                    <div className="space-y-4">
                        <h3 className="text-zinc-500 text-sm font-medium uppercase tracking-wider pl-1">本月成就</h3>
                        {completed.length === 0 ? (
                            <div className="py-8 text-center border border-dashed border-zinc-800 rounded-3xl text-zinc-600">
                                這個月還沒有完成的重要事項
                            </div>
                        ) : (
                            <div className="space-y-2">
                                {completed.map(t => (
                                    <div key={t.id} className="flex items-center gap-4 p-4 bg-zinc-900/30 border border-zinc-800/50 rounded-2xl">
                                        <div className="h-2 w-2 rounded-full bg-white flex-shrink-0" />
                                        <div className="flex-1">
                                            <p className="text-zinc-200 line-through decoration-zinc-600 decoration-2">{t.title}</p>
                                            <p className="text-xs text-zinc-500 mt-1">{t.date}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Philosophy Section */}
                    <div className="py-8 text-center opacity-50">
                        <p className="font-serif italic text-zinc-600">"Focus on being productive instead of busy."</p>
                    </div>

                </div>
            );
        };

        // --- Main App ---

        function App() {
            const [tasks, setTasks] = useState([]);
            const [view, setView] = useState('home'); // 'home', 'stats', 'add'
            const [showSplash, setShowSplash] = useState(true);
            
            // Init & Load Data
            useEffect(() => {
                const savedTasks = localStorage.getItem('moment_tasks');
                if (savedTasks) {
                    try {
                        setTasks(JSON.parse(savedTasks));
                    } catch (e) {
                        console.error("Failed to parse tasks", e);
                    }
                }
            }, []);

            // Save Data
            useEffect(() => {
                localStorage.setItem('moment_tasks', JSON.stringify(tasks));
            }, [tasks]);

            // Helpers
            const getTodayString = (date = new Date()) => {
                const offset = date.getTimezoneOffset() * 60000;
                const localISOTime = (new Date(date - offset)).toISOString().slice(0, -1);
                return localISOTime.split('T')[0];
            };

            const todayStr = getTodayString();
            
            const todaysTasks = useMemo(() => {
                return tasks.filter(t => t.date === todayStr);
            }, [tasks, todayStr]);

            const remainingSlots = 3 - todaysTasks.length;

            const handleAddTask = (title) => {
                if (remainingSlots <= 0) return;
                const newTask = {
                    id: Date.now(),
                    title,
                    status: 'pending', // pending, running, completed
                    date: todayStr,
                    startTime: null,
                    endTime: null,
                    duration: 0
                };
                setTasks([...tasks, newTask]);
                setView('home');
            };

            const handleTaskAction = (taskId) => {
                setTasks(tasks.map(t => {
                    if (t.id !== taskId) return t;
                    
                    if (t.status === 'pending') {
                        return { ...t, status: 'running', startTime: Date.now() };
                    } else if (t.status === 'running') {
                        return { ...t, status: 'completed', endTime: Date.now() };
                    }
                    return t;
                }));
            };

            const handleDeleteTask = (taskId) => {
                if(window.confirm("確定要刪除這個任務嗎？")) {
                    setTasks(tasks.filter(t => t.id !== taskId));
                }
            };

            return (
                <div className="flex justify-center bg-black min-h-screen">
                    <GlobalStyles />
                    
                    {/* Splash Screen Overlay */}
                    {showSplash && <SplashScreen onFinish={() => setShowSplash(false)} />}

                    <div className="w-full max-w-md bg-black min-h-screen relative flex flex-col shadow-2xl shadow-zinc-900/20 transition-opacity duration-1000">
                        
                        {/* Header */}
                        <header className="px-6 pt-12 pb-6 flex justify-between items-end bg-gradient-to-b from-black to-transparent sticky top-0 z-20">
                            <div>
                                <p className="text-zinc-500 text-xs font-medium tracking-wider mb-1 uppercase">
                                    {new Date().toLocaleDateString('zh-TW', { weekday: 'long', month: 'long', day: 'numeric' })}
                                </p>
                                <h1 className="text-3xl font-serif text-white">
                                    {view === 'home' ? '今日聚焦' : (view === 'add' ? '添加任務' : '時光軌跡')}
                                </h1>
                            </div>
                            {view === 'home' && (
                                <div className="h-10 w-10 rounded-full border border-zinc-800 flex items-center justify-center bg-zinc-900/50">
                                    <span className="font-serif text-lg text-white">{todaysTasks.filter(t => t.status === 'completed').length}/3</span>
                                </div>
                            )}
                        </header>

                        {/* Content Area */}
                        <main className="flex-1 px-6 relative overflow-y-auto custom-scrollbar no-scrollbar">
                            
                            {view === 'home' ? (
                                <HomeView 
                                    tasks={todaysTasks} 
                                    remainingSlots={remainingSlots} 
                                    onAddTask={() => setView('add')}
                                    onAction={handleTaskAction}
                                    onDelete={handleDeleteTask}
                                />
                            ) : view === 'add' ? (
                                <AddTaskView 
                                    onCancel={() => setView('home')} 
                                    onConfirm={handleAddTask} 
                                />
                            ) : (
                                <StatsView tasks={tasks} />
                            )}

                        </main>

                        {/* Tab Bar */}
                        {view !== 'add' && (
                            <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-6 z-30 pointer-events-none">
                                <div className="bg-zinc-900/80 backdrop-blur-xl border border-zinc-800/50 rounded-full px-6 py-4 flex justify-between items-center shadow-2xl pointer-events-auto">
                                    <button 
                                        onClick={() => setView('home')}
                                        className={`flex flex-col items-center gap-1 transition-colors ${view === 'home' ? 'text-white' : 'text-zinc-600'}`}
                                    >
                                        <Clock size={24} strokeWidth={view === 'home' ? 2.5 : 2} />
                                        <span className="text-[10px] font-medium">當下</span>
                                    </button>

                                    {/* Central Action Button */}
                                    <div className="relative -top-8">
                                        <button 
                                            onClick={() => remainingSlots > 0 ? setView('add') : null}
                                            disabled={remainingSlots === 0}
                                            className={`h-16 w-16 rounded-full flex items-center justify-center shadow-lg shadow-black/50 transition-all active:scale-95 ${remainingSlots > 0 ? 'bg-white text-black hover:bg-gray-100' : 'bg-zinc-800 text-zinc-600 border border-zinc-700'}`}
                                        >
                                            {remainingSlots > 0 ? <Plus size={32} /> : <span className="text-xl font-serif">完</span>}
                                        </button>
                                    </div>

                                    <button 
                                        onClick={() => setView('stats')}
                                        className={`flex flex-col items-center gap-1 transition-colors ${view === 'stats' ? 'text-white' : 'text-zinc-600'}`}
                                    >
                                        <BarChart2 size={24} strokeWidth={view === 'stats' ? 2.5 : 2} />
                                        <span className="text-[10px] font-medium">回顧</span>
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
